<!doctype html>
<!-- INTERVAL: the deluxe window. A different renderer, the same world.
     This file proves the architecture's central claim: no window is
     authoritative. The reference window paints pixels; this one builds
     geometry, casts real shadows, and lights fires that actually shine.
     Both read the same states from the same nodes and disagree about
     nothing but light.

     This revision is the deluxe window gone truly deluxe: a shader sky
     with a burning sun disc and a cratered moon, dawns that actually
     blush, water with fresnel and sun-glints, wind through instanced
     grass, embers and smoke above every fire, bloom and grading over
     the whole frame. Same wire. Same key. Same ticks. Only the light
     got ambitious.

     And then more ambitious still. This pass adds the air between
     things: crepuscular shafts raking out of the sun, cloud shadows
     crawling over the meadow, snow that SETTLES and whitens the world,
     a rainbow when the rain lets up, moonlight glinting off the water,
     lens flare for whoever stares at the sun, film grain and a touch
     of chromatic fringe in the grade, contact shadows under every
     body, birds crossing the noon sky, butterflies over the flowers,
     leaves falling from the autumn trees, and rain that splashes where
     it lands. Every last one derives from the same tick, obeys the
     same adaptive-quality governor, and degrades gracefully to the
     frame that shipped before it.

     This pass visits the smithy and the horizon. The tools in every
     hand got reforged: wrapped hafts, honed bits, a fullered sword
     whose tip shares the blade's material so starlight dyes the whole
     edge. The inventory icons got repainted with one outline, one
     light, and a glow for anything the stars touched. The pyramids on
     the skyline became mountains: displaced, snow-capped, two ranks
     deep, with a ridged rampart at the border and raycast crags on its
     slopes. And on the clear midnights the tick chooses, an aurora
     waves over the north, and every window sees the same lights.

     Then the bodies learned to mean it. Every being now carries its own
     animator: a stride phase driven by measured velocity (no skating,
     no marching in step), knees that plant, a lean into the walk and a
     roll into the turn, strikes and chops in three acts — windup, whip,
     landing — with the sound rung at the moment of the bite, heads on a
     true neck pivot that find the foe, watch the work, and glance idly
     about, wolves that trot on diagonal pairs with opinionated tails,
     and feet that stand on the ground the ground actually is.

     Then the world found its voice, and the water found its edge. The
     audio grew a bus and a compressor, stereo ears for every placed
     sound, texture under every tone; the wind's pitch follows its
     strength, the shore laps louder as you near it, the fire crackles
     and pops its knots, footfalls speak in the ground's own voice, and
     on aurora nights the sky faintly rings. At the waterline: a coast
     the sea never had, sand darkening where the water reaches, and a
     line of foam along every shore, each segment lapping to its own
     clock.

     Then the town got its carpentry, and the window learned honesty.
     Every building now draws its character from its own hash: jettied
     second storeys on bracket beams, corner posts, diagonal braces,
     roofs that sag and kick their eaves the way old rafters spread,
     mullioned windows on sills (the houses hang flower boxes), planked
     and hinged doors over worn stone steps, trade signs swinging on
     their brackets in the wind, a forge mouth breathing orange, and
     windows that light household by household as the dusk deepens.
     Six lanterns stand the perimeter — true lights on fine machines.
     And when a browser cannot sign (insecure origin, walled storage),
     the window now SAYS SO in a banner instead of silently spectating;
     blocked storage no longer costs the key, only its persistence.

     Then the fights learned to land, and the world learned to be read.
     Every blow flashes white through the struck body and knocks it a
     flinch backward; close blows shudder the camera; blades whoosh and
     leave an arc of light on the whip; bowstrings twang and their
     arrows actually FLY, arcing from archer to mark; death is a fall
     held a moment, not a switch. A minimap rides the corner, painted
     once from the same pure terrain functions every window shares,
     with living dots for beasts, fires, and neighbors, your own gold
     mark and its facing — and tapping the map walks the world. The
     grade was mended too: grain moved after gamma and out of the
     shadows, fringe pushed to the rim, a true dither against banding —
     the rainbow confetti of dark half-resolution nights is gone.

     Then the map came home, the items found their verbs, and the world
     learned to confess. The minimap is LOCAL now: a window that walks
     with you, close enough to show the trees. Every item offers every
     interaction the engine actually grants it — light fire, cook,
     bury, plant, eat, wield, and near the town, sell and deposit — all
     through the same signed wire, every shape blessed by the engine's
     own validator. The peaks bake a fixed sun into their vertex colors
     (flat pale triangles became faceted rock, in families now, with
     strata and spurs). The double pauldrons came off the shoulders and
     the cloak became fabric: narrow at the clasp, flaring at the hem,
     darker than any tunic. And when steps go unanswered, the window
     SAYS SO: the header carries the live tick, turns red and admits
     'the world holds its breath' when it stalls, and after five silent
     steps the feed names the likely culprit instead of shrugging.

     And every level earned is now CELEBRATED: each skill watched the
     way /play watches it, a banner in the window's own chrome popping
     over the scene, and true fireworks — three rockets that climb from
     your feet and burst into shells of gold, starlight, and ember
     sparks, each shell heard where it opens. Chasing a harness flake
     through that celebration exposed a true race — a fast gate click
     could mint a second identity and adopt one key while playing the
     other — now impossible: the identity flies ONCE, and every door
     knocks on the same promise.

     Then the progression loop closed, and the surfaces learned to
     remember the sky. Experience DRIPS now: every point floats up and
     names its skill in that skill's own color. A skills panel rides
     the corner — all fifteen, each with its level and a bar of how far
     the next one stands, in the inventory's own chrome. And the
     weather stopped being only an atmosphere: snow settles on the tree
     crowns and whitens the roofs first, feet press blue-gray prints
     into the snow and dark ones into the wet sand by the water, rain
     leaves standing puddles on the trails that wear the sky's color
     until the sun takes them back, and on cold nights every citizen's
     breath shows.

     The confetti was flowers. The rainbow noise that haunted every
     high camera at dusk was the meadow's own vanity — hundreds of far
     saturated flower heads against the fogged gray, blooming into
     colored smears at half resolution. Each flower now shrinks with
     distance and withdraws entirely past thirty paces. The grazing sun
     yields to the sky before its shadow frustum can print a hard box
     around the player, and the night motes burn a little lower.

     Then the door learned it was a door. The threshold no longer hides
     the world behind a wall of dark: a thin dusk, an ornate card, and
     the LIVE world turning behind it — it does not wait for you.
     Embers rise past the title. Inside, every building's door now
     swings on a working hinge as a walker nears, creaking, spilling
     hearth-light onto the step after dark. Dropped things stand on the
     ground as their own icons, bobbing, tappable — the walker goes,
     stands on the very tile (the engine insists), and takes them. And
     the world can SPEAK: words bubble over the head that said them,
     four seconds and gone, and the say button signs each message with
     the same key that signs every step.

     Then the voice stopped killing the music. prompt() was a system
     modal, and iOS suspends the AudioContext behind any modal and
     never wakes it — so speaking once silenced the world. The chat is
     an in-page bar now, in the window's own chrome, and every gesture,
     every send, and every return to the tab knocks the audio awake.

     Then the town opened for business. Stand at the bank and its panel
     slides in: the vault's contents as true icons, each with a take
     button; stand at the store and it names its prices both ways —
     what it sells, what your gold allows, and a reminder that it buys.
     Both counters can stand in one street. The gear panel undresses:
     weapon, head, body, each removable, each slot honest about being
     bare. Every verb rides the same signed wire and every shape was
     blessed by the engine before it shipped.

     Then the last of the vocabulary came home. The anvil shows its
     recipes — costs, star-metal level requirements, forge buttons that
     grey until your pack and your levels agree. Logs fletch into bows
     and bones into arrows from the item menu; charts offer themselves
     to be read. The unnamed find a claim button and a bar that knows
     the law of names. And trade, the most social verb the world has:
     tap a neighbor, choose what you give from your own icons, name
     what you want — an item or gold, exactly one, as the engine
     insists — and the offer stands in the state itself for all windows
     to see until it is accepted beside you or withdrawn. Their offers
     arrive the moment the state carries them. The deluxe window now
     speaks the engine's entire language.

     Then the sky learned to be weather, and the window learned to be
     left alone. The dome carries its own clouds now: two warped veils
     of noise drifting on a wind whose ledger the CPU keeps, silver at
     the sun's edge, alight at dusk, bruised under storm, black by
     midnight — the sprites keep their parallax, the dome carries the
     mood, and the stars go out when the overcast says so. The stars
     themselves came alive: each one its own size, its own color (white
     mostly, blue giants, a few old red suns), its own pulse no
     neighbor shares — and at night they ride the water beside the
     moon's road. The moon keeps a calendar: the tick turns the phase,
     a terminator slides across the face, and the halo and the cold key
     light wax and wane with it. The storm's flash finally has a BODY —
     a jagged bolt minted fresh per strike, forked twice, flickering
     for the fifth of a second the light allows. The lens confesses an
     anamorphic smear through the sun. And forty-five untouched seconds
     buy the idle cinema: the slowest orbit there is, letterbox bars
     breathing in, the world as a painting that happens to be true —
     one touch buys it all back.

     Then the axe learned the difference between rock and wood, the
     fanfare came home, and the walk stood up straight. Rock is BEATEN —
     the pick keeps its overhead rise-and-drop — but wood is FELLED: the
     arm winds out to the side and back on an axis the animator never
     owned before, the torso coils behind it, and the whole side of the
     body whips the bit level into the trunk, edge turned to face the
     cut, hips carrying it through, the off arm counterbalancing the
     arc. The level-up now sings the reference window's own fanfare,
     ported note for note — every note its own voice with its own bloom
     and ring, the high C held over its quiet fifth — enhanced only by
     a near-silent octave above the crown and a breath of glitter as it
     opens, timed so the first firework shell pops as the top note
     lands. And the lean finally leans the right way: the walk-pitch
     was turning about the WORLD's x-axis (Euler order XYZ), so a
     citizen walking south leaned backward and one walking east tipped
     sideways; YXZ pitches the body in its own heading, and every
     walker now leans INTO the walk, wherever the walk is going.

     Then the quarry learned to show its wounds, the face came out of
     the hair, and the ranges got their rock back. A mined boulder now
     collapses to low dark rubble, moss torn off with the stone, and a
     mined crystal cluster loses its spikes, its light and its halo —
     both stand up again the tick the world restores them, so worked
     and waiting seams can be told at a glance. The surcoat planks came
     off the chest (two flat boards read as a sign worn round the neck,
     not cloth); the emblem alone stays, pinned to the tunic. The face
     was a true burial: the hair cap's shell ran past the equator over
     the brow, and the eye whites sat INSIDE the skull with only the
     pupil tips showing — the cap now sits higher, leans off the brow
     and stops sooner, and the whole eye moved forward to sit ON the
     face, as eyes do. And the ranges left the scene fog that was
     painting them 60–90% horizon-white at their distance: the material
     now mixes real rock in the hour's light with only as much haze as
     the murk earns, so blue-gray slopes carry white caps by day, warm
     at the horizon hours, and go near-black against the night.

     Then the tools learned their handedness and the frame found its
     edge. The rod was held UPSIDE DOWN — thin tip in the fist, butt
     swinging in the air, line knotted mid-shaft — a spear with a bead
     on it; rebuilt: butt in the fist, shaft tapering away down the
     cast, the arm raised to carry it out over the water, and the line
     group counter-rotated to hang plumb from the very tip, bobber at
     its end. The pick turned a quarter: its tines now ride IN the
     swing plane instead of striking the rock broadside. Bare fists
     draw the bronze sword when the fighting starts — the reference
     window always showed a blade for the unarmed, and the two windows
     now agree (the swing was already the unarmed default; only the eye
     needed convincing). The walk-lean eased from a headwind to a hint.
     And the grade grew an unsharp mask — four neighbours make a blur
     and the frame is pushed away from it, edges biting at every
     pixel-ratio the governor chooses — while the rim fringe pulled
     back from smear to character.

     Then the window learned which way was north. The minimap became a
     COMPASS: a round disc that turns under a fixed cardinal ring, so
     the way you face is always up, N/E/S/W standing outside it, your
     own gold chevron at the center pointing where you point — and
     tapping the map still walks the world, through the same rotation.
     The area's name rides under it, mirrored tile-for-tile from /play's
     own region function, so "the Fens" means one place in both windows.
     The river stopped being a chain of squares: each water tile is a
     disc now, overlapping its neighbours into one sheet and rounding
     off wherever the run ends. And the town walls face along their run
     — a segment with a north-south neighbour but no east-west one turns
     a quarter, so the short side of a town reads as a wall and not a
     row of broadside planks.

     Then the light learned to touch. The sun's net now dances in every
     shallow — two detuned lattices multiplied into caustics that crawl
     over the sand, warm by day, and on clear nights the moon leaves a
     cold ghost of the same net. The air over every near fire BENDS:
     three columns of screen-space shimmer, paid for only when a fire
     is close and the governor allows it. At the horizon hours, and
     after the rain, the meadow breathes a low fog that pools by the
     water and turns to face whoever looks. The lanterns earned their
     moths — three small lives each that cannot leave the glass alone,
     and that shelter when it rains. And two nights in every nine, by
     the tick's own calendar, a comet hangs low with its tail streaming
     — every window on earth sees the same visitor on the same
     evenings, because the tick, as always, decides.

     Then the compass told the truth, and the legs answered the keys.
     The disc had been turning with the BODY while the eye orbited
     free — drag the camera and the map lied; and the cardinal ring
     stood painted to the frame, so N marked north at exactly one
     heading. The disc turns with the CAMERA now, spun by CSS at frame
     rate (the canvas paints north-up and never rotates itself), the
     letters orbit to where the directions actually are — each glyph
     counter-spun upright — and the center chevron shows which way the
     body faces within the view. Tap-to-walk undoes the one rotation
     that now exists. And WASD walks the world: W is wherever the
     camera looks, intent taken in view space and snapped to the grid
     the engine speaks, diagonals zigzagging one axis per tick at the
     tick's own cadence, the first step answering the press itself —
     and a hand on the keys outranks every standing order.

     Then the eye learned the elevation the feet already knew. The
     camera had orbited sea level while every body stood on the actual
     ground — walk the rampart and the rig sank beneath the world's
     skin, the floor turning to see-through sky, water adrift, black
     shadow-blobs, a citizen's nameplate huge against the void. The
     whole rig rides the walker's TRUE height now: the orbit centers
     on it, the look-target sits on it, the collision ray starts above
     it — and beneath everything a hard floor, sampled from the same
     remembered height-grid the feet trust, so whatever the ray
     misses, the eye never dips below the ground standing under it. -->

<script>
const ICON_CV = {} // the sprite cache: cut off in extraction, restored here
function itemSprite(item) {
  if (ICON_CV[item]) return ICON_CV[item]
  const c = document.createElement('canvas'); c.width = 32; c.height = 32
  const g = c.getContext('2d')
  g.lineJoin = 'round'; g.lineCap = 'round'

    uniform float uFlare; uniform float uAspect; uniform vec3 uTint;

//  ATMOSPHERE: weather from the tick, wind, juice, and a living sky.
//  The weather is a PURE function of the tick — so /play and every other
//  window would compute the same storm at the same moment, with not one
//  byte crossing the wire. Determinism was always the point; here it buys
//  us a shared sky.

const lerp = (a, b, t) => a + (b - a) * t

// ---- the weather oracle: hashed slow sinusoids, smooth and repeatable ----

  const slow = (period, salt) => Math.sin(tick / period + h(salt) * 6.283)
  // precipitation builds and breaks over a few hundred ticks

  precip = clamp01((precip - 0.34) / 0.55)
  // a temperature proxy decides rain vs snow
  const cold = slow(880, 73) + (h(77) - 0.5) * 0.6
  const snow = cold > 0.4 ? precip : 0
  const rain = cold > 0.4 ? 0 : precip

function makePool(n, color, blending) {
  const items = []
  for (let i = 0; i < n; i++) {
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: GLOW_TEX, color, transparent: true,
      opacity: 0, depthWrite: false, blending: blending ?? THREE.NormalBlending }))
    sp.visible = false; scene.add(sp)
    items.push({ sp, life: 0, max: 1, vx: 0, vy: 0, vz: 0, g: 0, base: 0.3, grow: 1, op0: 1 })
  }
  return {
    items, cursor: 0,
    spawn(x, y, z, o) {
      const it = items[this.cursor]; this.cursor = (this.cursor + 1) % items.length
      it.life = 0; it.max = o.max ?? 0.6; it.vx = o.vx ?? 0; it.vy = o.vy ?? 0; it.vz = o.vz ?? 0
      it.g = o.g ?? 0; it.base = o.size ?? 0.3; it.grow = o.grow ?? 1; it.op0 = o.opacity ?? 1
      it.sp.position.set(x, y, z); it.sp.material.color.set(o.color ?? color)
      it.sp.material.opacity = it.op0; it.sp.scale.setScalar(it.base); it.sp.visible = true
      return it

    update(dt) {

        if (f >= 1) { it.sp.visible = false; continue }
        it.vy += it.g * dt
        it.sp.position.x += it.vx * dt; it.sp.position.y += it.vy * dt; it.sp.position.z += it.vz * dt
        it.sp.material.opacity = it.op0 * (1 - f * f)
        it.sp.scale.setScalar(it.base * (1 + f * (it.grow - 1)))
      }
    }
  }
}

// ---- the ambient bed: wind, rain, birds, crickets, the shore, the
// fire, and on the right nights the sky itself — all synthesized, all
// routed through one bus and glued by a gentle compressor so a storm
// and a swordfight can happen at once without clipping. ----
let ambient3 = null
function initAmbient() {
  if (!AC3 || ambient3) return
  try {
    const bus = AC3.createGain(); bus.gain.value = 1
    const comp = AC3.createDynamicsCompressor()
    comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 5
    comp.attack.value = 0.005; comp.release.value = 0.2
    bus.connect(comp); comp.connect(AC3.destination)
    const noiseBuf = AC3.createBuffer(1, AC3.sampleRate * 2, AC3.sampleRate)
    const nd = noiseBuf.getChannelData(0)
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1
    const mkNoise = (type, freq, q) => {
      const src = AC3.createBufferSource(); src.buffer = noiseBuf; src.loop = true
      const f = AC3.createBiquadFilter(); f.type = type; f.frequency.value = freq; if (q) f.Q.value = q
      const g = AC3.createGain(); g.gain.value = 0
      src.connect(f); f.connect(g); g.connect(bus); src.start()
      return { g, f }
    }
    const wind = mkNoise('lowpass', 480)      // the wind, whose cutoff now follows its strength
    const rain = mkNoise('highpass', 1200)
    const lap = mkNoise('lowpass', 520)       // the shore, breathing by proximity
    const crackle = mkNoise('bandpass', 900, 0.9) // the fire, flickering by proximity
    // the aurora's shimmer: three thin sines, detuned to beat slowly —
    // barely there, the sound of the sky remembering it is electric
    const aurGain = AC3.createGain(); aurGain.gain.value = 0; aurGain.connect(bus)
    for (const [f0, det] of [[1567.98, 0], [2093.0, 0.9], [2637.02, 2.1]]) {
      const o = AC3.createOscillator(); o.type = 'sine'; o.frequency.value = f0 + det
      const og = AC3.createGain(); og.gain.value = 0.33
      o.connect(og); og.connect(aurGain); o.start()
    }
    ambient3 = { bus, noiseBuf, windGain: wind.g, windF: wind.f, rainGain: rain.g,
      lapGain: lap.g, crackleGain: crackle.g, aurGain }
    // birds by day, crickets by night: scheduled, reading the live sky
    setInterval(() => {
      if (!AC3 || !entered) return
      if (curDay > 0.5 && Math.random() < 0.5) { // a chirp or two
        const notes = 2 + (Math.random() * 2 | 0)
        for (let i = 0; i < notes; i++) {
          const o = AC3.createOscillator(), g = AC3.createGain()
          const t0 = AC3.currentTime + i * 0.11
          o.type = 'sine'; o.frequency.setValueAtTime(2200 + Math.random() * 1400, t0)
          o.frequency.exponentialRampToValueAtTime(1800 + Math.random() * 1000, t0 + 0.07)
          g.gain.setValueAtTime(0.0001, t0); g.gain.linearRampToValueAtTime(0.05 * (1 - curW.rain), t0 + 0.01)
          g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.09)
          o.connect(g); g.connect(bus); o.start(t0); o.stop(t0 + 0.1)
        }
      }
      if (curNight > 0.5 && curW.rain < 0.3 && Math.random() < 0.7) { // crickets
        const o = AC3.createOscillator(), g = AC3.createGain()
        const t0 = AC3.currentTime
        o.type = 'square'; o.frequency.value = 4200
        for (let k = 0; k < 3; k++) {
          g.gain.setValueAtTime(0.0001, t0 + k * 0.08)
          g.gain.linearRampToValueAtTime(0.018, t0 + k * 0.08 + 0.01)
          g.gain.exponentialRampToValueAtTime(0.0001, t0 + k * 0.08 + 0.05)
        }
        o.connect(g); g.connect(bus); o.start(t0); o.stop(t0 + 0.3)
      }
    }, 1400)
  } catch {}
}

    const fx2 = Math.min(1, Math.max(0, px - 0.5 - x0)), fy2 = Math.min(1, Math.max(0, pz - 0.5 - y0))
    cA.set(0, 0, 0)
    let h2 = 0
    const corners = [[x0, y0, (1 - fx2) * (1 - fy2)], [x1, y0, fx2 * (1 - fy2)], [x0, y1, (1 - fx2) * fy2], [x1, y1, fx2 * fy2]]
    let mountainW = 0, wetW = 0
    for (const [tx3, ty3, w3] of corners) {
      const tt = terrainC(tx3, ty3)
      cB.set(TERRAIN_COL[tt])
      cA.r += cB.r * w3; cA.g += cB.g * w3; cA.b += cB.b * w3
      h2 += tileH(tt, tx3, ty3) * w3
      if (tt === 'mountain') mountainW += w3
      if (nearWater(tx3, ty3) || tt === 'sea') wetW += w3 // how close the water's reach
    }
    // per-tile mottle, as before, plus a fine grain so the ground never bands
    const v2 = 0.88 + (tileHash(gx, gy, 0) % 100) / 480 + (noise2(px, pz) - 0.5) * 0.10
    cA.multiplyScalar(v2)
    h2 += (noise2(px + 31, pz + 17) - 0.5) * (mountainW > 0.4 ? 0.65 : 0.10)
    if (mountainW > 0.3 && h2 > 1.6) cA.lerp(snow, Math.min(1, (h2 - 1.6) * 1.1)) // the caps, higher now
    if (shoreOf(gx, gy) && !nearWater(gx, gy)) {
      cA.lerp(sand, 0.45); h2 = Math.min(h2, -0.04)
      if (wetW > 0) cA.lerp(wetSand, Math.min(1, wetW * 1.8) * 0.6) // the waterline, darker where the water reaches
    }
    if (nearWater(gx, gy)) { h2 = Math.min(h2, -0.34); cA.multiplyScalar(0.7) } // the basin, dim under water
    pos.setY(i, h2)
    groundHGrid[Math.round(pz * 2) * GW2 + Math.round(px * 2)] = h2
    colors.push(cA.r, cA.g, cA.b)
  }
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3))
  geo.computeVertexNormals()
  // the horizon skirt: beyond the founding, misty land instead of void
  skirtMat = new THREE.MeshStandardMaterial({ color: 0x33481f, roughness: 1 })
  const skirt = new THREE.Mesh(new THREE.CircleGeometry(400, 40), skirtMat)
  skirt.rotation.x = -Math.PI / 2; skirt.position.y = -0.6 // BELOW the water beds: it once smothered every lake
  scene.add(skirt)
  // the earth textured: procedural grass mottling under the vertex colors
  const tcv = document.createElement('canvas'); tcv.width = 512; tcv.height = 512
  const tg = tcv.getContext('2d')
  tg.fillStyle = '#8a9a7a'; tg.fillRect(0, 0, 512, 512)
  for (let i = 0; i < 9000; i++) {
    const tx2 = (i * 97) % 512, ty2 = (i * 61 + ((i * i) % 29)) % 512
    tg.fillStyle = ['#7d8f6e', '#95a583', '#839272', '#8d9d7d', '#98a888', '#788a6a'][i % 6]
    tg.fillRect(tx2, ty2, 1 + (i % 3), 1 + ((i >> 2) % 3))
  }
  for (let i = 0; i < 1400; i++) { // blades
    const tx2 = (i * 151) % 512, ty2 = (i * 83) % 512
    tg.strokeStyle = 'rgba(60,80,40,.45)'; tg.beginPath()
    tg.moveTo(tx2, ty2 + 4); tg.lineTo(tx2 + 1, ty2); tg.stroke()
  }
  for (let i = 0; i < 260; i++) { // small stones in the weave
    const tx2 = (i * 211) % 512, ty2 = (i * 127) % 512
    tg.fillStyle = 'rgba(120,118,108,.30)'
    tg.beginPath(); tg.arc(tx2, ty2, 1 + (i % 2), 0, 7); tg.fill()
  }
  const gtex = new THREE.CanvasTexture(tcv)
  gtex.wrapS = gtex.wrapT = THREE.RepeatWrapping
  gtex.repeat.set(W / 3, H / 3)
  gtex.anisotropy = renderer.capabilities.getMaxAnisotropy?.() ?? 1
  const mat = new THREE.MeshStandardMaterial({ vertexColors: true, map: gtex, roughness: 0.96, metalness: 0 })
  // the ground learns two more truths: clouds pass over it, and snow
  // settles on it. Both are one texture sample and two lerps.
  mat.onBeforeCompile = (sh) => {
    sh.uniforms.uTimeG = uT
    sh.uniforms.uCloudTex = { value: CLOUD_NOISE }
    sh.uniforms.uCloudAmt = uCloudAmt
    sh.uniforms.uSnowAmt = uSnowAmt
    sh.vertexShader = 'varying vec3 vWorld3;\n' + sh.vertexShader.replace('#include <begin_vertex>',
      `#include <begin_vertex>
      vWorld3 = (modelMatrix * vec4(position, 1.0)).xyz;`)
    sh.fragmentShader = 'uniform float uTimeG; uniform sampler2D uCloudTex; uniform float uCloudAmt; uniform float uSnowAmt;\nvarying vec3 vWorld3;\n'
      + sh.fragmentShader.replace('#include <color_fragment>',
      `#include <color_fragment>
      float cs = texture2D(uCloudTex, vWorld3.xz * 0.013 + vec2(uTimeG * 0.0062, uTimeG * 0.0024)).r;
      cs = smoothstep(0.30, 0.75, cs);
      diffuseColor.rgb *= mix(1.0, 0.68 + 0.32 * cs, uCloudAmt);            // the clouds crawl over the meadow
      float sm = smoothstep(-0.08, 0.04, vWorld3.y) * uSnowAmt;             // beds stay dark under the water
      diffuseColor.rgb = mix(diffuseColor.rgb, vec3(0.86, 0.89, 0.94), sm * 0.85); // the world whitens`)
  }
  const mesh = new THREE.Mesh(geo, mat)
  mesh.receiveShadow = true
  scene.add(mesh)
  groundMesh = mesh

  // crags: the mountain wears its own rubble. Each boulder is raycast
  // down onto the true slope, so nothing floats and nothing drowns.
  {
    const cragGeo = new THREE.IcosahedronGeometry(0.3, 0)
    const cragMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.95 })
    const CRAG_N = FINE ? 300 : 160
    const crags = new THREE.InstancedMesh(cragGeo, cragMat, CRAG_N)
    crags.castShadow = true; crags.receiveShadow = true
    const cray = new THREE.Raycaster(), down = new THREE.Vector3(0, -1, 0), from = new THREE.Vector3()
    const cdummy = new THREE.Object3D(), ccol = new THREE.Color()
    let ci2 = 0
    for (let i = 0; i < 30000 && ci2 < CRAG_N; i++) {
      const gx = tileHash(i, 31, 70) % W, gy = tileHash(i, 37, 71) % H
      const tt = terrainOf(gx, gy)
      if (tt !== 'mountain' && tt !== 'scree') continue
      if (tt === 'scree' && tileHash(gx, gy, 72) % 3 !== 0) continue
      const px2 = wx(gx) + ((tileHash(i, 3, 73) % 80) - 40) / 100
      const pz2 = wz(gy) + ((tileHash(i, 5, 74) % 80) - 40) / 100
      from.set(px2, 12, pz2)
      cray.set(from, down)
      const hit2 = cray.intersectObject(mesh)[0]
      if (!hit2) continue
      cdummy.position.set(px2, hit2.point.y + 0.02, pz2)
      cdummy.rotation.set(tileHash(i, 7, 75) % 6, tileHash(i, 9, 76) % 6, 0)
      const s3 = 0.5 + (tileHash(i, 11, 77) % 110) / 100
      cdummy.scale.set(s3, s3 * (0.6 + (tileHash(i, 13, 78) % 50) / 100), s3)
      cdummy.updateMatrix()
      ccol.setHSL(0.6, 0.05, 0.32 + (tileHash(i, 15, 79) % 26) / 100)
      crags.setColorAt(ci2, ccol)
      crags.setMatrixAt(ci2++, cdummy.matrix)
    }
    crags.count = ci2
    scene.add(crags)
  }

  // ---- the lanterns: six posts stand the town's perimeter and light
  // at dusk. On fine machines each carries a true (shadowless) point
  // light; elsewhere the glass alone glows and the eye believes it. ----
  {
    const cx3 = Math.floor(W / 2)
    const spots = [[cx3 - 8, 2], [cx3 + 8, 2], [cx3 - 8, 10], [cx3 + 8, 10], [cx3, 1], [cx3, 11]]
    const postM = new THREE.MeshStandardMaterial({ color: 0x2e2620, roughness: 0.9 })
    const ironM = new THREE.MeshStandardMaterial({ color: 0x26262b, roughness: 0.5, metalness: 0.5 })
    for (const [lx2, ly2] of spots) {
      const lg = new THREE.Group()
      const post = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.05, 1.15, 6), postM)
      post.position.y = 0.575; post.castShadow = true; lg.add(post)
      const arm2 = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.03, 0.24), ironM)
      arm2.position.set(0, 1.12, 0.1); lg.add(arm2)
      const cage = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.13, 0.09), ironM)
      cage.position.set(0, 1.02, 0.2); lg.add(cage)
      const glass = new THREE.Mesh(new THREE.BoxGeometry(0.065, 0.095, 0.065),
        new THREE.MeshStandardMaterial({ color: 0x1a140c, emissive: 0xffc06a, emissiveIntensity: 0 }))
      glass.position.copy(cage.position); lg.add(glass)
      const cap2 = new THREE.Mesh(new THREE.ConeGeometry(0.075, 0.06, 4), ironM)
      cap2.position.set(0, 1.1, 0.2); cap2.rotation.y = Math.PI / 4; lg.add(cap2)
      const moths = [] // three small lives that cannot leave the light alone
      for (let mo2 = 0; mo2 < 3; mo2++) {
        const ms2 = new THREE.Sprite(new THREE.SpriteMaterial({ map: GLOW_TEX, color: 0xd9c79b,
          transparent: true, opacity: 0, depthWrite: false }))
        ms2.scale.set(0.05, 0.05, 1); ms2.position.copy(cage.position); lg.add(ms2)
        moths.push({ s: ms2, a: Math.random() * 6.28, v: 0.7 + Math.random() * 0.9 })
      }
      let pl2 = null
      if (FINE) { // light without the shadow bill
        pl2 = new THREE.PointLight(0xffb060, 0, 4.5)
        pl2.position.copy(cage.position); pl2.castShadow = false; lg.add(pl2)
      }
      lg.position.set(wx(lx2), Math.max(0, groundYAt(lx2, ly2)), wz(ly2))
      scene.add(lg)
      lanterns.push({ glass, pl: pl2, moths, seed: (tileHash(lx2, ly2, 63) % 628) / 100 })
    }
  }

  // ---- the puddles: rain leaves standing water on the packed ground.
  // Deterministic hollows on trail and cobble tiles; the sky's memory
  // (rainMem) fills them and the sun takes them back. They wear the
  // fog's color, which is to say the sky's. ----
  {
    const pudGeo = new THREE.CircleGeometry(0.5, 12)
    pudGeo.rotateX(-Math.PI / 2)
    const pudMat = new THREE.MeshBasicMaterial({ color: 0x6a7a8a, transparent: true, opacity: 0, depthWrite: false })
    let placed = 0
    for (let i = 0; i < 8000 && placed < 16; i++) {
      const gx = tileHash(i, 41, 84) % W, gy = tileHash(i, 43, 85) % H
      const tt = terrainOf(gx, gy)
      if (tt !== 'trail' && tt !== 'cobble') continue
      if (tileHash(gx, gy, 86) % 5 !== 0) continue
      const pd2 = new THREE.Mesh(pudGeo, pudMat)
      const s6 = 0.4 + (tileHash(gx, gy, 87) % 60) / 100
      pd2.scale.set(s6, 1, s6 * (0.6 + (tileHash(gx, gy, 88) % 40) / 100))
      pd2.rotation.y = (tileHash(gx, gy, 89) % 628) / 100
      pd2.position.set(wx(gx) + ((tileHash(gx, gy, 90) % 60) - 30) / 100, Math.max(0, groundYAt(gx, gy)) + 0.015, wz(gy))
      pd2.renderOrder = 1
      scene.add(pd2)
      puddles.push(pd2)
      placed++
    }
    if (puddles.length) puddles.mat = pudMat
  }

  // ---- the foam itself: one merged strip of quads along every edge
  // where a water tile meets land. v runs 0 at the land edge to 1 in
  // the water; each segment carries a hashed phase so no two laps agree.
  // The midpoints are kept so the ambient bed can HEAR the shore. ----
  {
    const isW = (x2, y2) => x2 < 0 || y2 < 0 || x2 >= W || y2 >= H ? true : waterSet.has(x2 + ',' + y2)
    const vertsF = [], uvsF = [], phF = [], idxF = []
    const vertsC = [], uvsC = [], idxC = [] // the caustic strip shares the coastline
    shoreXZ = []
    let vi = 0, segN = 0, vc = 0
    const FW = 0.46 // how far the foam argues into the water
    const CW = 1.15 // how far the sun's net reaches before the deep swallows it
    for (const key of waterSet) {
      const parts = key.split(',')
      const gx = +parts[0], gy = +parts[1]
      const wy2 = terrainOf(gx, gy) === 'sea' ? -0.185 : -0.115 // a hair above each water's own level
      for (const [dx2, dy2] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
        if (isW(gx + dx2, gy + dy2)) continue
        const ex2 = wx(gx) + dx2 * 0.5, ez2 = wz(gy) + dy2 * 0.5 // the shared edge
        const tx4 = dy2 !== 0 ? 0.5 : 0, tz4 = dx2 !== 0 ? 0.5 : 0 // half-tangent along it
        const nx4 = -dx2 * FW, nz4 = -dy2 * FW // inward: off the land, into the water
        vertsF.push(
          ex2 - tx4, wy2, ez2 - tz4,
          ex2 + tx4, wy2, ez2 + tz4,
          ex2 - tx4 + nx4, wy2, ez2 - tz4 + nz4,
          ex2 + tx4 + nx4, wy2, ez2 + tz4 + nz4)
        uvsF.push(0, 0, 1, 0, 0, 1, 1, 1)
        const ph2 = (tileHash(gx, gy, 91) % 628) / 100
        phF.push(ph2, ph2, ph2, ph2)
        idxF.push(vi, vi + 1, vi + 2, vi + 1, vi + 3, vi + 2)
        vi += 4
        const cx4 = -dx2 * CW, cz4 = -dy2 * CW // the caustic strip, past the foam
        vertsC.push(
          ex2 - tx4, wy2 + 0.006, ez2 - tz4,
          ex2 + tx4, wy2 + 0.006, ez2 + tz4,
          ex2 - tx4 + cx4, wy2 + 0.006, ez2 - tz4 + cz4,
          ex2 + tx4 + cx4, wy2 + 0.006, ez2 + tz4 + cz4)
        uvsC.push(0, 0, 1, 0, 0, 1, 1, 1)
        idxC.push(vc, vc + 1, vc + 2, vc + 1, vc + 3, vc + 2)
        vc += 4
        if ((segN++ & 1) === 0) shoreXZ.push(ex2 + nx4 * 0.5, ez2 + nz4 * 0.5)
      }
    }
    const fgeo = new THREE.BufferGeometry()
    fgeo.setAttribute('position', new THREE.Float32BufferAttribute(vertsF, 3))
    fgeo.setAttribute('uv', new THREE.Float32BufferAttribute(uvsF, 2))
    fgeo.setAttribute('aPhase', new THREE.Float32BufferAttribute(phF, 1))
    fgeo.setIndex(idxF)
    const foam = new THREE.Mesh(fgeo, foamMat)
    foam.renderOrder = 2 // over the water, under nothing
    scene.add(foam)
    const cgeo = new THREE.BufferGeometry()
    cgeo.setAttribute('position', new THREE.Float32BufferAttribute(vertsC, 3))
    cgeo.setAttribute('uv', new THREE.Float32BufferAttribute(uvsC, 2))
    cgeo.setIndex(idxC)
    causticMesh = new THREE.Mesh(cgeo, causticMat)
    causticMesh.renderOrder = 2 // light lands ON the water, additive and weightless
    scene.add(causticMesh)
    // ---- the dawn's low fog: it pools where the water is. A handful of
    // billboards stand off the shore, each with its own breath, and they
    // only rise at the horizon hours or after rain — the meadow exhaling. ----
    for (let mi = 0; mi < shoreXZ.length && mists.length < 14; mi += 16) {
      const mx = shoreXZ[mi], mz = shoreXZ[mi + 1]
      const mm = new THREE.Mesh(new THREE.PlaneGeometry(7.5, 1.7),
        new THREE.MeshBasicMaterial({ map: MIST_TEX, transparent: true, opacity: 0,
          depthWrite: false, side: THREE.DoubleSide }))
      mm.position.set(mx, 0.42, mz)
      mm.visible = false
      scene.add(mm)
      mists.push({ m: mm, x0: mx, z0: mz, seed: Math.abs(Math.sin(mx * 12.7 + mz * 3.1)) * 6.28 })
    }
  }

  // ---- the sea proper: one broad sheet off the east edge. If the mirror
  // loaded, it reflects the true sky and shore; the waves ripple that
  // reflection. Otherwise the fresnel wave-shader stands in, unbothered. ----
  if (USE_REFLECTOR && THREE.Reflector) {
    try {
      const seaGeo = new THREE.PlaneGeometry(70, H + 120, 40, 60)
      seaReflector = new THREE.Reflector(seaGeo, { color: 0x2b4a5c, textureWidth: 512, textureHeight: 512, clipBias: 0.004 })
      seaReflector.rotation.x = -Math.PI / 2
      seaReflector.position.set(wx(W - 4) + 33, -0.20, 0)
      scene.add(seaReflector)
      // keep the flat rest-state so waves can be added and released cleanly
      seaWaves = { geo: seaGeo, base: Float32Array.from(seaGeo.attributes.position.array) }
      feed('the sea holds a mirror')
    } catch (e) { seaReflector = null }
  }
  if (!seaReflector) {
    const sea = new THREE.Mesh(new THREE.PlaneGeometry(70, H + 120, 24, 36), waterMat)
    sea.rotation.x = -Math.PI / 2
    sea.position.set(wx(W - 4) + 33, -0.20, 0)
    sea.renderOrder = 1
    scene.add(sea)
  }

  // grass: instanced tufts wherever the meadow is: an RPG is mostly grass,
  // and now the wind moves through all of it
  const tuftGeo = new THREE.ConeGeometry(0.032, 0.2, 5)
  tuftGeo.translate(0, 0.1, 0)
  const tuftMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1 })
  tuftMat.onBeforeCompile = (sh) => {
    sh.uniforms.uTime = uT
    sh.uniforms.uWind = uWind
    sh.vertexShader = 'uniform float uTime;\nuniform float uWind;\n' + sh.vertexShader.replace('#include <begin_vertex>',
      `#include <begin_vertex>
      #ifdef USE_INSTANCING
        vec4 iw = instanceMatrix * vec4(0.0, 0.0, 0.0, 1.0);
        float gust = 0.35 + uWind;                                        // the whole field leans with the wind
        float sway = sin(uTime * (1.3 + uWind) + iw.x * 0.9 + iw.z * 0.7) + sin(uTime * 2.6 + iw.z * 1.3) * 0.5;
        transformed.x += (sway * 0.09 + uWind * 0.10) * position.y * gust;// gusts bend it downwind
        transformed.z += (sway * 0.05 + uWind * 0.05) * position.y * gust;
      #endif`)
  }
  const TUFT_N = FINE ? 15000 : 9000 // an RPG is mostly grass; a desktop can afford more of it
  const tufts = new THREE.InstancedMesh(tuftGeo, tuftMat, TUFT_N)
  const dummy = new THREE.Object3D()
  const gc = new THREE.Color()
  let ti = 0
  for (let i = 0; i < 120000 && ti < TUFT_N; i++) {
    const gx = tileHash(i, 7, 40) % W, gy = tileHash(i, 11, 41) % H
    { const t5 = terrainOf(gx, gy); if (t5 !== 'meadow' && t5 !== 'greenwood' && t5 !== 'fens') continue }
    dummy.position.set(wx(gx) + ((tileHash(i, 3, 42) % 80) - 40) / 100, 0, wz(gy) + ((tileHash(i, 5, 43) % 80) - 40) / 100)
    dummy.rotation.y = (tileHash(i, 9, 44) % 628) / 100
    dummy.scale.setScalar(0.7 + (tileHash(i, 13, 45) % 70) / 100)
    dummy.updateMatrix()
    gc.setHSL(0.26 + (tileHash(i, 15, 46) % 20) / 300, 0.5, 0.24 + (tileHash(i, 17, 47) % 24) / 100)
    tufts.setColorAt(ti, gc)
    tufts.setMatrixAt(ti++, dummy.matrix)
  }
  tufts.count = ti
  scene.add(tufts)
  // flowers: the meadow keeps a little vanity
  const flowerGeo = new THREE.SphereGeometry(0.028, 6, 4)
  const flowerMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.7 })
  // the confetti bug, solved at its root: from a high camera at dusk,
  // hundreds of saturated far flowers read as rainbow noise against the
  // fogged meadow. So each flower SHRINKS with distance — full vanity
  // near the walker, nothing at all past thirty paces. No transparency,
  // no sorting: geometry simply withdraws.
  flowerMat.onBeforeCompile = (sh) => {
    sh.vertexShader = sh.vertexShader.replace('#include <begin_vertex>',
      `#include <begin_vertex>
      #ifdef USE_INSTANCING
        vec4 fo = instanceMatrix * vec4(0.0, 0.0, 0.0, 1.0);
        float fd = distance((modelMatrix * fo).xyz, cameraPosition);
        transformed *= smoothstep(32.0, 17.0, fd);
      #endif`)
  }
  const FLOWER_N = FINE ? 1400 : 900
  const flowers = new THREE.InstancedMesh(flowerGeo, flowerMat, FLOWER_N)
  const FLOWER_COLS = [0xf0e8f8, 0xe8c53a, 0xd46a9e, 0x8ab8e8, 0xe86a4a]
  let fi = 0
  for (let i = 0; i < 40000 && fi < FLOWER_N; i++) {
    const gx = tileHash(i, 19, 48) % W, gy = tileHash(i, 23, 49) % H
    if (terrainOf(gx, gy) !== 'meadow') continue
    if (tileHash(gx, gy, 55) % 7 !== 0) continue
    dummy.position.set(wx(gx) + ((tileHash(i, 3, 56) % 80) - 40) / 100, 0.10, wz(gy) + ((tileHash(i, 5, 57) % 80) - 40) / 100)
    dummy.rotation.set(0, 0, 0)
    dummy.scale.setScalar(0.8 + (tileHash(i, 7, 58) % 50) / 100)
    dummy.updateMatrix()
    gc.set(FLOWER_COLS[tileHash(i, 9, 59) % FLOWER_COLS.length])
    flowers.setColorAt(fi, gc)
    flowers.setMatrixAt(fi++, dummy.matrix)
  }
  flowers.count = fi
  scene.add(flowers)
  // pebbles: the trails and the scree keep their gravel
  const pebGeo = new THREE.DodecahedronGeometry(0.04, 0)
  const pebMat = new THREE.MeshStandardMaterial({ color: 0x8a867c, roughness: 1 })
  const pebbles = new THREE.InstancedMesh(pebGeo, pebMat, 900)
  let pi2 = 0
  for (let i = 0; i < 30000 && pi2 < 900; i++) {
    const gx = tileHash(i, 27, 63) % W, gy = tileHash(i, 29, 64) % H
    const tt = terrainOf(gx, gy)
    if (tt !== 'trail' && tt !== 'scree' && tt !== 'cobble') continue
    dummy.position.set(wx(gx) + ((tileHash(i, 3, 65) % 80) - 40) / 100, 0.02, wz(gy) + ((tileHash(i, 5, 66) % 80) - 40) / 100)
    dummy.rotation.y = tileHash(i, 7, 67) % 6
    dummy.scale.set(1, 0.5, 1).multiplyScalar(0.6 + (tileHash(i, 9, 68) % 80) / 100)
    dummy.updateMatrix()
    gc.setHSL(0.09, 0.06, 0.35 + (tileHash(i, 11, 69) % 30) / 100)
    pebbles.setColorAt(pi2, gc)
    pebbles.setMatrixAt(pi2++, dummy.matrix)
  }
  pebbles.count = pi2
  scene.add(pebbles)

  // motes: pollen by day, fireflies by night: the air itself is alive
  const moteGeo = new THREE.BufferGeometry()
  const motePos = []
  for (let i = 0; i < 260; i++) motePos.push((tileHash(i, 4, 60) % 400) / 10 - 20, 0.3 + (tileHash(i, 5, 61) % 30) / 10, (tileHash(i, 6, 62) % 400) / 10 - 20)
  moteGeo.setAttribute('position', new THREE.Float32BufferAttribute(motePos, 3))
  motes = new THREE.Points(moteGeo, new THREE.PointsMaterial({ color: 0xfff4c0, size: 0.055, map: GLOW_TEX,
    transparent: true, opacity: 0.5, depthWrite: false, blending: THREE.AdditiveBlending }))
  scene.add(motes)
  // stars: the night has a ceiling, and a river of milk across it.
  // And now the ceiling LIVES: every star carries its own size, its own
  // color (most white, some blue giants, a few old red suns), and its
  // own pulse — a shader twinkle no two stars share. The hour still
  // owns the master dimmer.
  const mkStarMat = () => new THREE.ShaderMaterial({
    transparent: true, depthWrite: false, fog: false, blending: THREE.AdditiveBlending,
    uniforms: { uTime: uT, uOp: { value: 0 } },
    vertexShader: `
      attribute float aTw; attribute float aSz; attribute vec3 aCol;
      varying float vA; varying vec3 vCol; uniform float uTime;
      void main() {
        vA = 0.55 + 0.45 * sin(uTime * (0.7 + aTw * 2.6) + aTw * 47.0); // each star keeps its own pulse
        vCol = aCol;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = aSz * (300.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      varying float vA; varying vec3 vCol; uniform float uOp;
      void main() {
        float dd = length(gl_PointCoord - 0.5);
        float a = smoothstep(0.5, 0.10, dd);
        gl_FragColor = vec4(vCol * (0.75 + vA * 0.5), a * vA * uOp);
      }`
  })
  const starDress = (count, salt, szLo, szHi) => {
    const tw = new Float32Array(count), sz = new Float32Array(count), cl = new Float32Array(count * 3)
    for (let i = 0; i < count; i++) {
      tw[i] = (tileHash(i, salt, 61) % 1000) / 1000
      const big = (tileHash(i, salt, 62) % 100) < 4 // the great lights: a handful, twice the size
      sz[i] = (szLo + (tileHash(i, salt, 63) % 1000) / 1000 * (szHi - szLo)) * (big ? 2.1 : 1)
      const roll = tileHash(i, salt, 64) % 100
      const c3 = roll < 14 ? [1.0, 0.83, 0.62]      // the old red suns
        : roll < 36 ? [0.72, 0.83, 1.0]              // the blue giants
          : [0.90, 0.94, 1.0]                        // and everyone else, white
      cl[i * 3] = c3[0]; cl[i * 3 + 1] = c3[1]; cl[i * 3 + 2] = c3[2]
    }
    return { tw, sz, cl }
  }
  const starGeo = new THREE.BufferGeometry()
  const starPos = []
  for (let i = 0; i < 700; i++) {
    const a = (tileHash(i, 1, 50) % 6283) / 1000, r2 = 60 + tileHash(i, 2, 51) % 60
    const h2 = 12 + tileHash(i, 3, 52) % 55
    starPos.push(Math.cos(a) * r2, h2, Math.sin(a) * r2)
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3))
  { const dNear = starDress(700, 5, 0.45, 1.6)
    starGeo.setAttribute('aTw', new THREE.BufferAttribute(dNear.tw, 1))
    starGeo.setAttribute('aSz', new THREE.BufferAttribute(dNear.sz, 1))
    starGeo.setAttribute('aCol', new THREE.BufferAttribute(dNear.cl, 3)) }
  stars = new THREE.Points(starGeo, mkStarMat())
  celestial.add(stars)
  const bandGeo = new THREE.BufferGeometry()
  const bandPos = []
  for (let i = 0; i < 1100; i++) { // the milky band, a tilted belt of faint suns
    const t3 = (tileHash(i, 8, 53) % 1000) / 1000 * Math.PI * 2
    const spread = ((tileHash(i, 9, 54) % 1000) / 1000 - 0.5) * 26
    const r2 = 95 + (tileHash(i, 10, 55) % 30)
    const bx = Math.cos(t3) * r2, bz = Math.sin(t3) * r2 * 0.4 + spread
    const by = Math.sin(t3) * r2 * 0.6 + 30 + spread * 0.4
    if (by < 6) continue
    bandPos.push(bx, by, bz)
  }
  bandGeo.setAttribute('position', new THREE.Float32BufferAttribute(bandPos, 3))
  { const nBand = bandPos.length / 3
    const dFar = starDress(nBand, 6, 0.28, 0.7)
    bandGeo.setAttribute('aTw', new THREE.BufferAttribute(dFar.tw, 1))
    bandGeo.setAttribute('aSz', new THREE.BufferAttribute(dFar.sz, 1))
    bandGeo.setAttribute('aCol', new THREE.BufferAttribute(dFar.cl, 3)) }
  starsFar = new THREE.Points(bandGeo, mkStarMat())
  celestial.add(starsFar)
  groundBuilt = true
}

// ---- the standing world: trees, rocks, buildings, fires, water ----
const nodeMeshes = new Map(), fireLights = new Map(), waterMeshes = [], markerMeshes = new Map()

function mkSmoke(parent, x, y0, z, scale, pace, dark) {
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: GLOW_TEX,
    color: dark ? 0x55534e : 0x8a8880, transparent: true, opacity: 0, depthWrite: false }))
  sp.position.set(x, y0, z)
  parent.add(sp)
  return { sp, seed: Math.random(), y0, scale, pace, drift: (Math.random() - 0.5) * 0.3 }
}
function nodeMesh(n) {
  const g = new THREE.Group()

    const trunk = cast(new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.15, 0.9, 7), std(0x5c4023)))
    trunk.position.y = 0.45; trunk.rotation.z = lean; g.add(trunk)
    const roots = cast(new THREE.Mesh(new THREE.CylinderGeometry(0.17, 0.26, 0.14, 7), std(0x4a3419)))
    roots.position.y = 0.06; g.add(roots)
    const canopy = new THREE.Group() // blobs, like the painter's two-tone crowns
    const tv = 0.85 + (hv % 30) / 100 // no two trees one green
    const autumn = (tileHash(n.x, n.y, 8) % 10) === 0 // one tree in ten turned early
    const tint = (c) => {

      b.position.set(x2, y2, z2); b.scale.y = 0.82; canopy.add(b)
      snowReg.push({ m: b.material, base: b.material.color.clone(), amt: 0.55 + (y2 - 0.9) * 0.5 }) // the crown catches most

    blob(0.48, 0x2f5c1a, 0, 0.98, 0)            // the dark under-mass
    blob(0.36, 0x3a7020, 0.26, 1.18, 0.12)
    blob(0.32, 0x3a7020, -0.24, 1.14, -0.10)
    blob(0.27, 0x4a8a2a, 0.05, 1.38, 0.02)      // the lit crown
    blob(0.20, 0x54983a, -0.10, 1.30, 0.16)

  } else if (n.type === 'rock' || n.type === 'magic-rock') {

      g.userData.crystals = []

        const cr = cast(new THREE.Mesh(new THREE.OctahedronGeometry(r2, 0), cm))
        cr.position.set(sx2, sy2, sz2); cr.scale.y = h3 / r2 * 0.9; cr.rotation.set(rot * 0.4, rot, rot * 0.2)

    } else {
      const m = cast(new THREE.Mesh(new THREE.DodecahedronGeometry(0.34, 0), std(0x8a867c)))
      m.position.y = 0.22; m.scale.y = 0.75; m.rotation.y = tileHash(n.x, n.y, 9) % 6; g.add(m)
      const m2 = cast(new THREE.Mesh(new THREE.DodecahedronGeometry(0.16, 0), std(0x7d7970)))
      m2.position.set(0.28, 0.1, 0.14); m2.scale.y = 0.7; g.add(m2)
      g.userData.rockParts = [m, m2] // the quarry will show its wounds
      if (tileHash(n.x, n.y, 10) % 2 === 0) { // moss keeps the north side

  } else if (n.type === 'campfire' || n.type === 'fire') {

    for (let si = 0; si < 7; si++) {

      const st = new THREE.Mesh(new THREE.DodecahedronGeometry(0.07, 0), std(0x6b675e))
      st.position.set(Math.cos(a) * 0.3, 0.04, Math.sin(a) * 0.3); st.scale.y = 0.7; g.add(st)

    flameO.position.y = 0.36; g.add(flameO)
    const flameI = new THREE.Mesh(new THREE.ConeGeometry(0.10, 0.36, 6), new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.95 }))

  } else if (n.type === 'fishing-spot') {
    // each water tile was a hard 1.1-square; a winding river became a

    const wmesh = new THREE.Mesh(new THREE.CircleGeometry(0.82, 20), waterMat)
    wmesh.rotation.x = -Math.PI / 2; wmesh.position.y = -0.13

    const rise = new THREE.Mesh(new THREE.RingGeometry(0.12, 0.16, 16),
      new THREE.MeshBasicMaterial({ color: 0xbfe4f4, transparent: true, opacity: 0.35, side: THREE.DoubleSide, depthWrite: false }))

    b.position.y = 0.34 + wallH / 2; g.add(b) // plastered ground floor
    let topY = 0.34 + wallH // where the roof will land

    for (const [px4, pz4] of [[-0.4, 0.4], [0.4, 0.4], [-0.4, -0.4], [0.4, -0.4]]) {

      for (let vi2 = 0; vi2 < rp.count; vi2++) {

    dark.position.set(0, 0.54, 0.428); g.add(dark)
    const spill = new THREE.Mesh(new THREE.PlaneGeometry(0.36, 0.55),

    for (const wx2 of [-0.26, 0.26]) {

function showBubble(pid, text) {

    if ((lines[lines.length - 1] + ' ' + w).trim().length > 24 && lines.length < 2) lines.push(w)
    else lines[lines.length - 1] = (lines[lines.length - 1] + ' ' + w).trim()

function syncNodes(s) {

        m.userData.watchLight.intensity = (low ? 1.6 : 3.4) + Math.sin(t4 * 8) * 0.4

      const has = n.readyAt !== undefined

      if (has) {

        m.userData.brewSurface.position.y = 0.425 + (ready ? 0.01 : 0)

    if (m.userData.pulse) m.userData.pulse.material.emissiveIntensity = 0.9 + Math.sin(performance.now() / 700 + n.x) * 0.4

        s._wallTiles = new Set()

      }
      const isWall = (dx, dy) => s._wallTiles.has((wxN + dx) + ',' + (wyN + dy))

      m.userData.wallAlign = null // the lattice does not move; resolve once
    }

    // to low rubble, darker and duller, its moss torn off with the

    // its halo, leaving only the socket rock; both stand up again the
    // tick the world restores them. ----
    if (m.userData.rockParts && m.userData.rockDep !== depleted) {

        rp.position.y = rp.userData.basePY * (depleted ? 0.42 : 1)
        rp.material.color.copy(rp.userData.baseCol).multiplyScalar(depleted ? 0.58 : 1)
      }

    }
    if (m.userData.crystals && m.userData.crystalDep !== depleted) {
      m.userData.crystalDep = depleted
      for (const cr of m.userData.crystals) cr.visible = !depleted
      if (m.userData.crystalLight) m.userData.crystalLight.visible = !depleted
      if (m.userData.halo) m.userData.halo.visible = !depleted
    }
    if (m.userData.plot) { // crops rise from the same arithmetic
      if (n.plantedAt > 0 && !m.userData.crop) {
        const crop = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.4, 5),
          new THREE.MeshStandardMaterial({ color: 0x7dbb45 }))
        crop.position.y = 0.2; m.add(crop); m.userData.crop = crop
      }
      if (m.userData.crop) {
        const el2 = s.tick - (n.plantedAt || 0)

        if (n.plantedAt > 0) {

        if (sl3.item === 'cooked-fish') acts += btn('eat', 'eat')
        if (sl3.item === 'raw-fish') acts += btn('cook', 'cook') // beside a fire, the engine will allow it
        if (sl3.item === 'logs') { acts += btn('light fire', 'light'); acts += btn('fletch bow', 'fletchbow') }
        if (sl3.item === 'bones') { acts += btn('bury', 'bury'); acts += btn('fletch arrows', 'fletcharrows') }
        if (/^chart:/.test(sl3.item)) acts += btn('read', 'read_chart')
        if (sl3.item === 'seeds') acts += btn('plant', 'plant')
        if (EQ.includes(sl3.item)) acts += btn('wield', 'wield')
        if (near2('store')) acts += btn('sell', 'sell')
        if (near2('bank')) acts += btn('deposit', 'deposit')
        acts += btn('drop', 'drop')
        bar.innerHTML = acts
        bar.style.display = 'flex'
      } else { bar.style.display = 'none' }
    }
  } catch (e) { document.getElementById('inv3d').textContent = '[pack error] ' + e.message }
  statEl.textContent = 'tick ' + s.tick + ' · ' + Object.keys(s.players).length + ' citizens · '
    + (me ? 'you are ' + (me.name ?? 'unnamed') + ' · ' : ownKey ? 'spawning you… · ' : 'spectating · ')
    + 'same world as /play'
  // adaptive quality: watch the frame, ease down when heavy, recover when light
  frameAvg = frameAvg * 0.92 + (dt * 1000) * 0.08
  if (frameAvg > 34) { slowStreak++; fastStreak = 0 }
  else if (frameAvg < 22) { fastStreak++; slowStreak = 0 }
  else { slowStreak = 0; fastStreak = 0 }
  if (slowStreak > 90 && quality > 0.5) {
    quality = 0.5; renderer.setPixelRatio(1); if (composer) composer.setPixelRatio(1); slowStreak = 0
    if (gradePass) gradePass.uniforms.uRes.value.set(1 / innerWidth, 1 / innerHeight) // the sharpen follows the true pixel
    if (shaftPass) shaftPass.enabled = false // the rays are the first luxury surrendered
    feed('easing the graphics for a smoother frame')
  } else if (fastStreak > 200 && quality < 1) {
    quality = 1; const pr = Math.min(devicePixelRatio, 2)
    renderer.setPixelRatio(pr); if (composer) composer.setPixelRatio(pr); fastStreak = 0
    if (gradePass) gradePass.uniforms.uRes.value.set(1 / (innerWidth * pr), 1 / (innerHeight * pr))
    if (shaftPass) shaftPass.enabled = true // and the first restored
  }
  // ---- the shafts: find the sun on the screen and rake the light from it.
  // Off-screen or under the horizon, the pass sleeps for free. ----
  if (shaftPass) {
    camera.updateMatrixWorld()
    sunNDC.copy(camera.position).addScaledVector(sunDirV, 80).project(camera)
    camera.getWorldDirection(antiSun) // borrowed scratch: is the eye even facing the sun?
    const facing = antiSun.dot(sunDirV) > 0.1
    const onScreen = facing && sunNDC.z < 1 && Math.abs(sunNDC.x) < 1.5 && Math.abs(sunNDC.y) < 1.5
    const edge = onScreen ? clamp01(1.6 - Math.max(Math.abs(sunNDC.x), Math.abs(sunNDC.y))) : 0
    const strength = edge * (sunH > -0.05 ? (0.30 * day + 0.85 * dusk) : 0) * (1 - gloom * 0.85)
    shaftPass.uniforms.uLightPos.value.set(sunNDC.x * 0.5 + 0.5, sunNDC.y * 0.5 + 0.5)
    shaftPass.uniforms.uIntensity.value = quality > 0.5 ? strength : 0
    shaftPass.uniforms.uFlare.value = quality > 0.5 ? strength * day * 0.8 : 0
    shaftPass.uniforms.uAspect.value = innerWidth / innerHeight
    shaftPass.uniforms.uTint.value.setRGB(1.0, 0.72 + 0.2 * day, 0.45 + 0.32 * day) // gold at noon, ember at dusk
  }
  if (composer) composer.render()
  else renderer.render(scene, camera)
}
requestAnimationFrame(animate)
</script>
</body>
</html>
