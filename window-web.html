  else if (it) { send({ do: 'drop', slot: +i }); feed('You drop the ' + it.item.replace('-', ' ') + '.') }
})

cv.addEventListener('click', (e) => {
  if (!world) return
  const r = cv.getBoundingClientRect()
  const sx = (e.clientX - r.left) * (cv.width / r.width)
  const sy = (e.clientY - r.top) * (cv.height / r.height)
  const x = Math.floor(sx / TILE + cam.x), y = Math.floor(sy / TILE + cam.y)
  if (x < 0 || x >= W || y < 0 || y >= H) return
  const me = world.players[myId]; if (!me) return
  const adj = (o) => Math.abs(me.x - o.x) + Math.abs(me.y - o.y) === 1

  // hit-test against RENDERED positions: a goblin mid-stride is clickable
  // where its body is, not where the grid will say it is in 300ms
  const fxT = sx / TILE + cam.x, fyT = sy / TILE + cam.y
  const tc = renderT(performance.now())
  const lp = (a, b) => a + (b - a) * tc
  let best = null
  for (const [id, m] of Object.entries(world.mobs)) {
    if (m.hp <= 0) continue
    const o = prevState?.mobs?.[id]
    const ix = o ? lp(o.x, m.x) : m.x, iy = o ? lp(o.y, m.y) : m.y
    const d = Math.hypot(ix + 0.5 - fxT, iy + 0.5 - fyT)
    if (d < 0.8 && (!best || d < best.d)) best = { d, kind: 'mob', id, m }
  }
  for (const [pid, p] of Object.entries(world.players)) {
    if (pid === myId) continue
    const o = prevState?.players?.[pid]
    const ix = o ? lp(o.x, p.x) : p.x, iy = o ? lp(o.y, p.y) : p.y
    const d = Math.hypot(ix + 0.5 - fxT, iy + 0.5 - fyT)
    if (d < 0.8 && (!best || d < best.d)) best = { d, kind: 'citizen', id: pid, p }
  }
  if (best?.kind === 'mob') {
    const { id, m } = best
    if (me.action?.mobId === id) return                        // already fighting it: silent
    if (adj(m)) { send({ do: 'attack', mobId: id }); feed('You attack the ' + m.type + '!') }
    else intent = { kind: 'attack', id }                       // hunt it down, then engage
    return
  }
  if (best?.kind === 'citizen') {
    const { id: pid, p } = best
    if (Math.abs(me.x - p.x) + Math.abs(me.y - p.y) === 1) openTrade(pid)
    else { intent = { kind: 'meet', id: pid }; feed('You approach ' + (p.name ?? 'the stranger') + '.') }
    return
  }

  for (const [gid, g2] of Object.entries(world.ground ?? {}))
    if (g2.x === x && g2.y === y) {
      if (!me.inventory.some(sl => sl === null)) { feed('Your pack is full: no room to pick that up.'); return }
      intent = { kind: 'pickup', id: gid }; return
    }

  for (const [id, n] of Object.entries(world.nodes))
    if (n.x === x && n.y === y) {
      if (me.action?.nodeId === id) return                     // already working it: silent
      if (n.type !== 'campfire' && n.type !== 'fire' && n.type !== 'bank' && n.type !== 'anvil' && n.depletedUntil > world.tick) {
        feed({ 'tree': 'The tree is felled. It will regrow.',
               'rock': 'The rock is mined out. Give it a moment.',
               'fishing-spot': "The fish aren't biting here yet." }[n.type] ?? 'Nothing left here.')
        return
      }
      if (n.type === 'anvil') {
        if (!adj(n)) { intent = { kind: 'anvilgo', id }; feed('You head to the anvil.'); return }
        smithBest(me); return
      }
      if (n.type === 'wall') {
        const cxW = Math.floor(W / 2)
        const onPerimeter = (n.y === 2 || n.y === 10 || n.x === cxW - 8 || n.x === cxW + 8)
        if (!onPerimeter) { // workshop timber: lighter build, lower profile
          poly([[X+6,Y+32],[X+34,Y+32],[X+34,Y+18],[X+6,Y+18]], '#5c4a30', '#2c2216')
          cx.fillStyle = 'rgba(0,0,0,.16)'
          cx.fillRect(X + 6, Y + 24.5, 28, 1.4)
          cx.fillRect(X + 13, Y + 18, 1.4, 14); cx.fillRect(X + 26, Y + 18, 1.4, 14)
          cx.fillStyle = 'rgba(255,255,255,.05)'; cx.fillRect(X + 6, Y + 18, 28, 1.6)
          return
        }
        const v = tileHash(n.x, n.y, 5) % 3
        poly([[X+2,Y+34],[X+38,Y+34],[X+38,Y+14],[X+2,Y+14]], ['#6e6a62', '#66625a', '#726e66'][v], '#2c2a26')
        cx.fillStyle = 'rgba(0,0,0,.14)'
        cx.fillRect(X + 2, Y + 20, 36, 1.6); cx.fillRect(X + 2, Y + 27, 36, 1.6)
        cx.fillRect(X + 12 + (v * 5), Y + 14, 1.6, 6); cx.fillRect(X + 22 - (v * 3), Y + 21, 1.6, 6)
        cx.fillStyle = 'rgba(255,255,255,.06)'; cx.fillRect(X + 2, Y + 14, 36, 2)
      }
      if (n.type === 'signpost') {
        shadow(X, Y, 7)
        cx.fillStyle = '#4a3a22'; cx.fillRect(X + 18.5, Y + 6, 3.4, 28)
        cx.font = 'bold 4.5px Verdana'; cx.textAlign = 'center'
        poly([[X+13,Y+9],[X+27,Y+9],[X+27,Y+3],[X+20,Y-1],[X+13,Y+3]], '#6e5433', '#2c2216')
        cx.fillStyle = '#2c2216'; cx.fillText('ANCHOR', X + 20, Y + 7)
        poly([[X+7,Y+12],[X+29,Y+12],[X+33,Y+14.5],[X+29,Y+17],[X+7,Y+17]], '#5f4a2c', '#2c2216')
        cx.fillStyle = '#2c2216'; cx.fillText('EAST', X + 18, Y + 15.6)
        poly([[X+33,Y+20],[X+11,Y+20],[X+7,Y+22.5],[X+11,Y+25],[X+33,Y+25]], '#6e5433', '#2c2216')
        cx.fillStyle = '#2c2216'; cx.fillText('WEST', X + 22, Y + 23.6)
      }
      if (n.type === 'guard' || n.type === 'smith') {
        shadow(X, Y, 8)
        const bob = Math.sin(now / 900 + n.x) * 0.6
        const isSmith = n.type === 'smith'
        // body
        cx.fillStyle = isSmith ? '#5a4632' : '#5a6b7d'
        cx.fillRect(X + 14, Y + 15 + bob, 12, 12)
        cx.fillStyle = isSmith ? '#3a2f22' : '#48576a'
        cx.fillRect(X + 14, Y + 22 + bob, 12, 5)
        // head + helm or soot
        cx.fillStyle = '#d9b07a'; cx.fillRect(X + 15.5, Y + 7 + bob, 9, 9)
        if (!isSmith) { cx.fillStyle = '#8a8a92'; cx.fillRect(X + 14.5, Y + 5.5 + bob, 11, 4.5) }
        else { cx.fillStyle = '#3a2f22'; cx.fillRect(X + 15.5, Y + 6 + bob, 9, 3) }
        cx.fillStyle = '#2b2b2b'; cx.fillRect(X + 21, Y + 10.5 + bob, 2, 2)
        // legs
        cx.fillStyle = '#2e2a24'; cx.fillRect(X + 15.5, Y + 27, 3.4, 6); cx.fillRect(X + 21, Y + 27, 3.4, 6)
        if (!isSmith) { // the spear
          cx.fillStyle = '#5c4023'; cx.fillRect(X + 27.5, Y + 4 + bob, 2.2, 26)
          poly([[X+28.6,Y+bob],[X+26.2,Y+5+bob],[X+31,Y+5+bob]], '#b8b8b0', '#6a6a66')
        } else { // the hammer, working
          const swing = Math.sin(now / 500) * 0.7
          cx.save(); cx.translate(X + 11, Y + 20 + bob); cx.rotate(-0.5 + swing)
          cx.fillStyle = '#5c4023'; cx.fillRect(-1, -9, 2, 10)
          cx.fillStyle = '#6a6a66'; cx.fillRect(-3.4, -12, 7, 3.4)
          cx.restore()
        }
      }
      if (n.type === 'well') {
        shadow(X, Y, 11)
        cx.fillStyle = '#6e6a62'
        cx.beginPath(); cx.ellipse(X + 20, Y + 26, 11, 6, 0, 0, 7); cx.fill()
        cx.fillStyle = '#1f4a63'
        cx.beginPath(); cx.ellipse(X + 20, Y + 25, 7.5, 3.8, 0, 0, 7); cx.fill()
        cx.fillStyle = '#4a3a22'
        cx.fillRect(X + 10, Y + 8, 2.4, 18); cx.fillRect(X + 27.5, Y + 8, 2.4, 18)
        poly([[X+7,Y+9],[X+33,Y+9],[X+20,Y+2]], '#6e5433', '#2c2216')
        cx.fillStyle = '#3a3a3e'; cx.fillRect(X + 19, Y + 10, 1.6, 8)
      }
      if (n.type === 'house') {
        const v = tileHash(n.x, n.y, 5) % 2
        shadow(X, Y, 15)
        poly([[X+5,Y+34],[X+35,Y+34],[X+35,Y+18],[X+5,Y+18]], v ? '#5b4a33' : '#54453a', '#1c1710')
        cx.fillStyle = 'rgba(0,0,0,.12)'
        for (let i = 0; i < 3; i++) cx.fillRect(X + 6, Y + 21 + i * 4.4, 28, 1.2)
        poly([[X+3,Y+18],[X+37,Y+18],[X+20,Y+6]], v ? '#6e5433' : '#7a5c36', '#2c2216')
        cx.fillStyle = '#3a2f22'; cx.fillRect(X + 16.5, Y + 24, 7, 10)
        cx.fillStyle = '#26501a'
        const cyc2 = (((s.tick + t) % 2400) / 2400)
        const nightNow = (Math.sin(cyc2 * Math.PI * 2) + 1) / 2 < 0.42
        cx.fillStyle = nightNow ? '#f4d03f' : '#2c2620'
        cx.fillRect(X + 27, Y + 22, 5, 5)
        cx.strokeStyle = '#1c1710'; cx.lineWidth = 1; cx.strokeRect(X + 27, Y + 22, 5, 5)
        cx.fillStyle = '#4a4038'; cx.fillRect(X + 27, Y + 7, 5, 8) // the chimney breathes
        for (let pf = 0; pf < 3; pf++) {
          const st = ((now / (2200 + pf * 700)) + pf * 0.33 + n.x * 0.1) % 1
          cx.fillStyle = 'rgba(200,200,195,' + (0.3 * (1 - st)) + ')'
          cx.beginPath()
          cx.arc(X + 29 + Math.sin(st * 5 + pf) * 4, Y + 5 - st * 16, 2 + st * 3.4, 0, 7)
          cx.fill()
        }
      }
      if (n.type === 'guard') { feed('The guard nods. "The road is watched, citizen."'); return }
      if (n.type === 'smith') { feed('The smith gestures at the anvil. "Ore and logs. The rest is rhythm."'); return }
      if (n.type === 'well') { feed('You peer into the well. Somewhere far below, a tick echoes.'); return }
      if (n.type === 'signpost') { feed('West: Westhearth. East: Eastmere. North: Anchor.'); return }
      if (n.type === 'wall') { feed('The wall is old, and it is not going anywhere.'); return }
      if (n.type === 'store') {
        shadow(X, Y, 14)
        poly([[X+4,Y+34],[X+36,Y+34],[X+36,Y+16],[X+4,Y+16]], '#5b4a33', '#1c1710')
        poly([[X+2,Y+16],[X+38,Y+16],[X+20,Y+6]], '#8a4a2a', '#2c1a10')
        for (let k = 0; k < 4; k++) { cx.fillStyle = k % 2 ? '#c9a86a' : '#8a4a2a'; cx.fillRect(X + 5 + k * 7.6, Y + 14, 7.6, 4) }
        cx.fillStyle = '#3a2f22'; cx.fillRect(X + 16.5, Y + 24, 7, 10)
        cx.fillStyle = '#ffe08a'; cx.font = 'bold 5px Verdana'; cx.textAlign = 'center'
        cx.fillText('STORE', X + 20, Y + 22)
      }
      if (n.type === 'bank') {
        if (!adj(n)) { intent = { kind: 'walk', x: n.x, y: n.y + 1 }; feed('You head to the bank.') }
        else feed('The bank stands ready: tap items to deposit, tap the vault to withdraw.')
        return
      }
      if (n.type === 'campfire' || n.type === 'fire') {
        if (!adj(n)) { intent = { kind: 'gatherfire', id, msg: 'You warm your hands by the fire.' }; return }
        const i = me.inventory.findIndex(s => s && s.item === 'raw-fish')
        if (i !== -1) { intent = { kind: 'cookall' }; feed('You start cooking your catch\u2026') }
        else feed('You have nothing to cook.')
        return
      }
      if (!me.inventory.some(sl => sl === null)) {
        feed('Your pack is full: bank it, drop it, or use it.')
        return
      }
      const msg = { 'tree': 'You swing your axe at the tree.',
                    'rock': 'You take a swing at the rock.',
                    'fishing-spot': 'You cast your line\u2026' }[n.type] ?? 'You begin gathering.'
      if (adj(n)) { send({ do: 'gather', nodeId: id }); feed(msg) }
      else intent = { kind: 'gather', id, msg }                // one click does it all
      return
    }

  if (blockedAt(world, x, y)) return
  intent = { kind: 'walk', x, y }
  if (me.action) send({ do: 'stop' })
})
</script>
